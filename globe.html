<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem('somnus-theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Globe — SOMNUS Command Center</title>
<meta name="description" content="SOMNUS command center: a live 3D financial Earth with market heatmaps, exchange sessions, and resource layers on real country geography.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="globe-page" data-page="globe">
<div id="app">
  <canvas id="globeCanvas"></canvas>

  <!-- LOADING -->
  <div id="loading">
    <div class="logo">SOMNUS</div>
    <div id="bootLines"></div>
    <div class="bootBar"><div id="bootFill"></div></div>
  </div>

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="brand"><span class="dot"></span> <a href="./index.html">SOMNUS</a>
      <nav id="topNav" aria-label="Primary">
        <a href="./index.html">Home</a>
        <a href="./markets.html">Markets</a>
        <a href="./about.html">About</a>
      </nav></div>
    <div id="topCenter">
      <div id="clocks"></div>
      <button class="theme-toggle" id="themeToggle" type="button" role="switch" aria-checked="false" aria-label="Switch to light theme" title="Toggle light / dark theme">
        <svg class="tt-sun" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4.4" fill="currentColor" stroke="none"/>
          <line x1="12" y1="1.5" x2="12" y2="3.5"/><line x1="12" y1="20.5" x2="12" y2="22.5"/>
          <line x1="1.5" y1="12" x2="3.5" y2="12"/><line x1="20.5" y1="12" x2="22.5" y2="12"/>
          <line x1="4.4" y1="4.4" x2="5.8" y2="5.8"/><line x1="18.2" y1="18.2" x2="19.6" y2="19.6"/>
          <line x1="4.4" y1="19.6" x2="5.8" y2="18.2"/><line x1="18.2" y1="5.8" x2="19.6" y2="4.4"/>
        </svg>
        <span class="tt-track"><span class="tt-knob"></span></span>
        <svg class="tt-moon" viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true">
          <path d="M20.2 14.9A8.6 8.6 0 1 1 9.1 3.8a7 7 0 0 0 11.1 11.1z"/>
        </svg>
      </button>
      <button class="mode-toggle" id="globeModeToggle" type="button" role="switch" aria-checked="false" aria-label="Switch to realistic view" title="Realistic view">
        <svg class="mt-grid" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="8.5"/>
          <ellipse cx="12" cy="12" rx="8.5" ry="3.4"/>
          <line x1="3.5" y1="12" x2="20.5" y2="12"/>
          <line x1="12" y1="3.5" x2="12" y2="20.5"/>
        </svg>
        <span class="mt-track"><span class="mt-knob"></span></span>
        <svg class="mt-earth" viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">
          <circle cx="12" cy="12" r="8.5" fill="#2E6FA8"/>
          <path d="M6.2 8.4c1.4-1.1 3.1-.9 4 .4.9 1.3-.4 2.2-1.5 3.1-1.1.9-2.6.7-3.4-.3-.8-1-.2-2.3.9-3.2z" fill="#4C9A5B"/>
          <path d="M14.2 5.8c1.9.1 3.6 1.6 4.1 3.4-1 .4-2.4.2-3.3-.6-.9-.8-1.6-1.9-.8-2.8z" fill="#4C9A5B"/>
          <path d="M13 13.6c1.9-.4 3.8.5 4.3 2.3-1.4.9-3.2.9-4.6 0-1-.6-1-1.8.3-2.3z" fill="#4C9A5B"/>
        </svg>
      </button>
    </div>
    <div id="utcWrap"><span id="utcTime">--:--:--</span><span class="utc-label"> UTC</span></div>
  </div>

  <!-- SEARCH -->
  <div class="search-box">
    <input id="countrySearch" type="text" placeholder="Search a country…" aria-label="Search for a country" autocomplete="off">
    <div id="searchResults" role="listbox"></div>
  </div>

  <!-- LEFT LAYER PANEL -->
  <div id="layerPanel">
    <div class="phead">
      <h3>DATA LAYERS</h3>
      <button id="panelCollapse" aria-label="Collapse panel">&#8249;</button>
    </div>
    <div class="pbody">
      <div id="layerList"></div>
      <button id="resetBtn">⟲ RESET VIEW</button>
      <div id="hints">[1–7] toggle layers &nbsp; [R] reset<br>drag = rotate · scroll = zoom</div>
    </div>
  </div>

  <!-- VIEW CONTROLS -->
  <div id="viewControls">
    <button class="vc-btn" id="vcZoomIn" aria-label="Zoom in">+</button>
    <button class="vc-btn" id="vcZoomOut" aria-label="Zoom out">−</button>
    <button class="vc-btn active" id="vcRotate" aria-label="Toggle auto-rotate" aria-pressed="true">⟳</button>
    <button class="vc-btn" id="vcReset" aria-label="Reset view">⌂</button>
    <button class="vc-btn" id="vcFull" aria-label="Toggle fullscreen">⛶</button>
  </div>

  <div id="legend"></div>
  <div id="countryLabels"></div>
  <div id="tooltip"></div>

  <!-- RIGHT DETAIL PANEL -->
  <div id="profilePanel">
    <button class="close" id="profileClose" aria-label="Close panel">✕</button>
    <div id="profileBody"></div>
  </div>

  <!-- TICKER -->
  <div id="tickerWrap"><div id="ticker"></div></div>

  <div id="vignette"></div>
  <div id="overlay"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="./assets/js/data.js"></script>
<script src="./assets/js/include.js"></script>
<script src="./assets/js/realistic-earth.js"></script>
<script src="./assets/js/globe.js"></script>
</body>
</html>
